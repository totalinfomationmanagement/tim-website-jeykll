<!DOCTYPE html>
<html lang="en">
<head>
  {% include head.html %}
  <style>
:root {
      --navy:      #1A3C5E;
      --teal:      #1A7DA0;
      --amber:     #C9A227;
      --deep-navy: #1A2B3C;
      --slate:     #4A5568;
      --border:    #E2E8F0;
      --offwhite:  #F4F6F8;
      --white:     #ffffff;
      --serif: 'Cormorant Garamond', Georgia, serif;
      --sans:  'IBM Plex Sans', system-ui, sans-serif;
      --mono:  'IBM Plex Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); color: var(--deep-navy); background: var(--white); line-height: 1.7; font-size: 18px; overflow-x: hidden; }

    /* NAV */
    nav { position: fixed; top: 0; left: 0; width: 100%; z-index: 100; background: rgba(26,43,60,0.97); backdrop-filter: blur(8px); border-bottom: 1px solid rgba(255,255,255,0.07); display: flex; align-items: center; justify-content: space-between; padding: 0 48px; height: 64px; }
    .nav-logo { display: flex; align-items: center; text-decoration: none; }
    .nav-logo-svg { height: 36px; width: auto; flex-shrink: 0; }
    .nav-links { display: flex; align-items: center; gap: 36px; list-style: none; }
    .nav-links a { text-decoration: none; font-size: 13px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.85); transition: color 0.2s; }
    .nav-links a:hover { color: var(--amber); }
    .nav-cta { background: var(--amber); color: var(--deep-navy) !important; padding: 8px 20px; font-weight: 600 !important; transition: opacity 0.2s; }
    .nav-cta:hover { opacity: 0.85; }

    /* HAMBURGER */
    .nav-hamburger { display: none; flex-direction: column; justify-content: center; align-items: center; gap: 5px; width: 40px; height: 40px; cursor: pointer; background: none; border: none; padding: 4px; z-index: 200; flex-shrink: 0; }
    .nav-hamburger span { display: block; width: 24px; height: 2px; background: white; border-radius: 2px; transition: transform 0.35s ease, opacity 0.25s ease, width 0.25s ease; transform-origin: center; }
    .nav-hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; width: 0; }
    .nav-hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    /* DRAWER */
    .nav-drawer { position: fixed; top: 0; right: 0; width: min(320px,85vw); height: 100dvh; background: var(--deep-navy); border-left: 1px solid rgba(255,255,255,0.08); z-index: 150; display: flex; flex-direction: column; padding: 88px 32px 48px; transform: translateX(100%); transition: transform 0.38s cubic-bezier(0.4,0,0.2,1); overflow-y: auto; }
    .nav-drawer.open { transform: translateX(0); }
    .nav-drawer-links { list-style: none; display: flex; flex-direction: column; gap: 0; flex: 1; }
    .nav-drawer-links li { border-bottom: 1px solid rgba(255,255,255,0.06); }
    .nav-drawer-links a { display: block; padding: 18px 0; font-size: 15px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.75); text-decoration: none; transition: color 0.2s, padding-left 0.2s; }
    .nav-drawer-links a:hover { color: var(--amber); padding-left: 8px; }
    .nav-drawer-cta { margin-top: 32px; background: var(--amber); color: var(--deep-navy) !important; padding: 16px 24px !important; font-weight: 600 !important; text-align: center; letter-spacing: 0.1em; display: block; text-decoration: none; font-size: 13px !important; text-transform: uppercase; }
    .nav-drawer-contact { margin-top: 32px; padding-top: 24px; border-top: 1px solid rgba(255,255,255,0.06); }
    .nav-drawer-contact p { font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.3); margin-bottom: 8px; }
    .nav-drawer-contact a { display: block; font-size: 13px; color: rgba(255,255,255,0.55); text-decoration: none; margin-bottom: 4px; }
    .nav-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 140; opacity: 0; pointer-events: none; transition: opacity 0.35s ease; }
    .nav-overlay.open { opacity: 1; pointer-events: all; }

    /* FOOTER */
    footer { background: var(--deep-navy); padding: 48px; display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 48px; border-top: 1px solid rgba(255,255,255,0.05); }
    .footer-brand .footer-name { font-family: var(--serif); font-size: 22px; font-weight: 300; color: white; margin-bottom: 4px; }
    .footer-brand .footer-sub { font-size: 13px; color: rgba(255,255,255,0.5); letter-spacing: 0.08em; }
    .footer-brand .footer-tagline { margin-top: 20px; font-size: 14px; color: rgba(255,255,255,0.6); line-height: 1.7; max-width: 260px; }
    .footer-section-title { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--amber); margin-bottom: 20px; }
    .footer-links { list-style: none; display: flex; flex-direction: column; gap: 10px; }
    .footer-links a { font-size: 15px; color: rgba(255,255,255,0.65); text-decoration: none; transition: color 0.2s; }
    .footer-links a:hover { color: white; }
    .footer-bottom { background: var(--deep-navy); padding: 16px 48px; border-top: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
    .footer-bottom p { font-size: 13px; color: rgba(255,255,255,0.45); letter-spacing: 0.05em; }
    .footer-est { font-family: var(--mono); font-size: 10px; color: rgba(201,162,39,0.5); letter-spacing: 0.1em; }

    /* FADE UP */
    .fade-up { opacity: 0; transform: translateY(28px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .fade-up.visible { opacity: 1; transform: translateY(0); }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      .expertise-grid { grid-template-columns: repeat(2,1fr) !important; }
      .updates-grid { grid-template-columns: 1fr 1fr !important; }
      .updates-grid .update-card.featured { grid-column: 1 / -1; }
    }
    @media (max-width: 768px) {
      nav { padding: 0 20px; height: 60px; }
      .nav-links { display: none; }
      .nav-hamburger { display: flex; }
      .nav-logo-svg { height: 28px; }
      section { padding: 56px 20px !important; }
      #hero { padding: 80px 20px 56px !important; min-height: 100dvh; justify-content: center; }
      .hero-headline { font-size: clamp(36px,10vw,52px) !important; margin-bottom: 20px; }
      .hero-tagline { font-size: 15px !important; margin-bottom: 32px; }
      .hero-actions { flex-direction: column; align-items: flex-start; gap: 16px; }
      .hero-stats { display: none !important; }
      .section-heading { font-size: clamp(28px,8vw,40px) !important; }
      #about, #work-with-us { grid-template-columns: 1fr !important; gap: 36px !important; }
      .about-card { padding: 28px !important; }
      .expertise-grid { grid-template-columns: 1fr !important; }
      .expertise-card { padding: 28px 24px !important; }
      .timeline-line { display: none; }
      .timeline-item { grid-template-columns: 1fr !important; padding: 20px 0; }
      .timeline-item::before { display: none; }
      .timeline-content { padding: 0 !important; }
      .updates-grid { grid-template-columns: 1fr !important; }
      .update-card { padding: 24px !important; }
      .contact-form { padding: 28px 24px !important; }
      footer { grid-template-columns: 1fr !important; gap: 28px; padding: 40px 20px; }
      .footer-bottom { flex-direction: column; gap: 8px; text-align: center; padding: 16px 20px; }
    }
    @media (max-width: 400px) {
      nav { padding: 0 16px; }
    }


    /* HERO */
    #hero {
      min-height: 100vh;
      background: var(--deep-navy);
      display: flex; flex-direction: column; justify-content: flex-end;
      padding: 0 48px 80px;
      position: relative; overflow: hidden;
    }
    .hero-bg-lines {
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(26,125,160,0.06) 1px,transparent 1px), linear-gradient(90deg,rgba(26,125,160,0.06) 1px,transparent 1px);
      background-size: 60px 60px; pointer-events: none;
    }
    .hero-accent-bar { position: absolute; top:0; left:0; width:5px; height:100%; background: linear-gradient(to bottom,var(--amber),var(--teal)); }
    .hero-badge { font-family:var(--mono); font-size:13px; letter-spacing:0.2em; text-transform:uppercase; color:var(--amber); margin-bottom:28px; display:flex; align-items:center; gap:12px; }
    .hero-badge::before { content:''; display:inline-block; width:32px; height:1px; background:var(--amber); }
    .hero-headline { font-family:var(--serif); font-size:clamp(52px,7vw,96px); font-weight:300; line-height:1.05; color:var(--white); max-width:820px; margin-bottom:32px; }
    .hero-headline em { font-style:italic; color:var(--amber); }
    .hero-tagline { font-size:17px; color:rgba(255,255,255,0.8); max-width:480px; margin-bottom:48px; line-height:1.8; }
    .hero-actions { display:flex; align-items:center; gap:24px; }
    .btn-primary { background:var(--amber); color:var(--deep-navy); padding:14px 32px; font-size:14px; font-weight:600; letter-spacing:0.12em; text-transform:uppercase; text-decoration:none; display:inline-block; transition:transform 0.2s,box-shadow 0.2s; }
    .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 24px rgba(201,162,39,0.3); }
    .btn-ghost { color:rgba(255,255,255,0.85); text-decoration:none; font-size:14px; letter-spacing:0.1em; text-transform:uppercase; border-bottom:1px solid rgba(255,255,255,0.4); padding-bottom:2px; transition:color 0.2s,border-color 0.2s; }
    .btn-ghost:hover { color:white; border-color:white; }
    .hero-stats { position:absolute; right:48px; bottom:80px; display:flex; flex-direction:column; gap:32px; align-items:flex-end; }
    .stat-item { text-align:right; }
    .stat-number { font-family:var(--serif); font-size:48px; font-weight:300; color:var(--white); line-height:1; }
    .stat-label { font-size:12px; text-transform:uppercase; letter-spacing:0.15em; color:rgba(255,255,255,0.6); margin-top:4px; }
    .stat-divider { width:1px; height:40px; background:rgba(255,255,255,0.1); margin-left:auto; }

    /* SECTIONS */
    section { padding: 96px 48px; }
    .section-label { font-family:var(--mono); font-size:12px; letter-spacing:0.2em; text-transform:uppercase; color:var(--teal); margin-bottom:16px; display:flex; align-items:center; gap:10px; }
    .section-label::after { content:''; display:inline-block; flex:1; max-width:40px; height:1px; background:var(--teal); }
    .section-heading { font-family:var(--serif); font-size:clamp(36px,4vw,56px); font-weight:300; line-height:1.15; color:var(--navy); margin-bottom:24px; }
    .section-heading em { font-style:italic; color:var(--teal); }

    /* ABOUT */
    #about { background:var(--offwhite); display:grid; grid-template-columns:1fr 1fr; gap:80px; align-items:center; }
    .about-text p { font-size:17px; color:var(--slate); margin-bottom:20px; line-height:1.9; }
    .about-card { background:var(--navy); padding:40px; color:white; position:relative; }
    .about-card-title { font-family:var(--serif); font-size:24px; font-weight:300; margin-bottom:24px; color:rgba(255,255,255,0.9); }
    .staff-table { width:100%; border-collapse:collapse; }
    .staff-table tr { border-bottom:1px solid rgba(255,255,255,0.12); }
    .staff-table td { padding:12px 0; font-size:15px; color:rgba(255,255,255,0.85); }
    .staff-table td:last-child { text-align:right; font-family:var(--mono); color:var(--amber); font-size:17px; }

    /* EXPERTISE */
    #expertise { background:var(--white); }
    .expertise-header { max-width:560px; margin-bottom:64px; }
    .expertise-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:2px; }
    .expertise-card { background:var(--offwhite); padding:40px 36px; position:relative; overflow:hidden; transition:background 0.3s; }
    .expertise-card::after { content:''; position:absolute; bottom:0; left:0; width:0; height:3px; background:var(--amber); transition:width 0.4s ease; }
    .expertise-card:hover { background:var(--border); }
    .expertise-card:hover::after { width:100%; }
    .expertise-icon { width:40px; height:40px; margin-bottom:24px; color:var(--teal); }
    .expertise-card h3 { font-family:var(--serif); font-size:24px; font-weight:500; color:var(--navy); margin-bottom:12px; }
    .expertise-card p { font-size:15px; color:var(--slate); line-height:1.8; }

    /* IMPACT */
    #impact { background:var(--navy); padding-bottom:0; }
    #impact .section-label { color:var(--amber); }
    #impact .section-label::after { background:var(--amber); }
    #impact .section-heading { color:var(--white); }
    #impact .section-heading em { color:var(--amber); }
    .impact-intro { max-width:560px; margin-bottom:64px; }
    .impact-intro p { font-size:17px; color:rgba(255,255,255,0.8); line-height:1.9; }
    .timeline-line { position:absolute; top:0; left:140px; width:1px; height:100%; background:rgba(255,255,255,0.08); }
    .timeline-item { display:grid; grid-template-columns:140px 1fr; padding:28px 0; border-bottom:1px solid rgba(255,255,255,0.05); position:relative; }
    .timeline-item::before { content:''; position:absolute; left:136px; top:38px; width:9px; height:9px; background:var(--teal); border-radius:50%; z-index:1; }
    .timeline-item.featured::before { background:var(--amber); }
    .timeline-year { font-family:var(--mono); font-size:13px; color:rgba(255,255,255,0.6); padding-top:4px; letter-spacing:0.08em; }
    .timeline-item.featured .timeline-year { color:var(--amber); }
    .timeline-content { padding:0 0 0 40px; }
    .timeline-client { font-size:13px; letter-spacing:0.1em; text-transform:uppercase; color:var(--teal); margin-bottom:4px; }
    .timeline-item.featured .timeline-client { color:var(--amber); }
    .timeline-desc { font-size:15px; color:rgba(255,255,255,0.8); line-height:1.7; }

    /* UPDATES */
    #updates { background:var(--offwhite); }
    .updates-header { display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:48px; }
    .updates-link { font-size:13px; letter-spacing:0.12em; text-transform:uppercase; color:var(--teal); text-decoration:none; border-bottom:1px solid var(--teal); padding-bottom:2px; }
    .updates-grid { display:grid; grid-template-columns:2fr 1fr 1fr; gap:2px; }
    a.update-card { cursor:pointer; transition:transform 0.2s,box-shadow 0.2s; }
    a.update-card:hover { transform:translateY(-3px); box-shadow:0 8px 24px rgba(0,0,0,0.08); }
    a.update-card.featured:hover { box-shadow:0 8px 24px rgba(0,0,0,0.25); }
    .update-card { background:white; padding:36px; display:flex; flex-direction:column; text-decoration:none; color:inherit; }
    .update-tag { font-family:var(--mono); font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--teal); margin-bottom:16px; }
    .update-card h3 { font-family:var(--serif); font-size:22px; font-weight:400; color:var(--navy); line-height:1.4; margin-bottom:12px; flex:1; }
    .update-card.featured h3 { font-size:30px; }
    .update-date { font-size:13px; color:rgba(74,85,104,0.7); letter-spacing:0.05em; }
    .update-read-more { margin-top:16px; font-size:12px; letter-spacing:0.1em; text-transform:uppercase; color:var(--teal); font-weight:500; }
    .update-card.featured { background:var(--navy); }
    .update-card.featured .update-tag { color:var(--amber); }
    .update-card.featured h3 { color:white; }
    .update-card.featured .update-date { color:rgba(255,255,255,0.5); }
    .update-card.featured .update-read-more { color:var(--amber); }

    /* WORK WITH US */
    #work-with-us { background:white; display:grid; grid-template-columns:1fr 1fr; gap:80px; align-items:center; }
    .contact-details { margin-top:40px; display:flex; flex-direction:column; gap:24px; }
    .contact-item { display:flex; flex-direction:column; gap:4px; }
    .contact-item-label { font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:rgba(74,85,104,0.7); }
    .contact-item-value { font-size:16px; color:var(--navy); }
    .contact-item-value a { color:var(--teal); text-decoration:none; }
    .contact-form { background:var(--offwhite); padding:48px; }
    .form-title { font-family:var(--serif); font-size:28px; font-weight:300; color:var(--navy); margin-bottom:32px; }
    .form-group { margin-bottom:20px; }
    .form-group label { display:block; font-size:12px; letter-spacing:0.15em; text-transform:uppercase; color:var(--slate); margin-bottom:8px; }
    .form-group input, .form-group select, .form-group textarea { width:100%; padding:12px 16px; border:1px solid var(--border); background:white; font-family:var(--sans); font-size:16px; color:var(--deep-navy); outline:none; transition:border-color 0.2s; }
    .form-group input:focus, .form-group select:focus, .form-group textarea:focus { border-color:var(--teal); }
    .form-group textarea { min-height:100px; resize:vertical; }
    .form-submit { width:100%; background:var(--navy); color:white; border:none; padding:14px; font-family:var(--sans); font-size:14px; letter-spacing:0.12em; text-transform:uppercase; cursor:pointer; transition:background 0.2s; margin-top:8px; }
    .form-submit:hover { background:var(--teal); }
  </style>
</head>
<body>
  {% include nav.html %}
  {{ content }}
  {% include footer.html %}
  {% include scripts.html %}
</body>
</html>
