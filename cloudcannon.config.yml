# CloudCannon Configuration - TiM Ltd.
# Docs: https://cloudcannon.com/documentation/

collections_config:
  posts:
    path: _posts
    output: true
    name: Articles
    singular_name: Article
    icon: newspaper

    # This tells CloudCannon how to name new files
    create:
      path: _posts/{date|year}-{date|month}-{date|day}-{title|slugify}.md

    # Schema used when clicking "Add Article"
    schemas:
      default:
        path: .cloudcannon/schemas/article.md
        name: New Article

    # Fields shown in the sidebar editor
    _inputs:
      title:
        type: text
        label: Article Title
        comment: The full headline of the article
      tag:
        type: select
        label: Category
        options:
          values:
            - Featured
            - Publication
            - Insight
            - News
      author:
        type: text
        label: Author
      read_time:
        type: text
        label: Read Time
        comment: "e.g. 5 min read"
      excerpt:
        type: textarea
        label: Summary
        comment: "Short summary shown on the news listing page (1-2 sentences)"

    # Rich text editor options for the article body
    _editables:
      content:
        allow_custom_markup: false
        bold: true
        format: p h2 h3
        italic: true
        strike: false
        subscript: false
        superscript: false
        underline: false
        link: true
        bulletedlist: true
        numberedlist: true
        blockquote: true
        horizontalrule: true
        image: false
        table: false
        undo: true
        redo: true

# Global editor settings
_inputs:
  date:
    type: date
    label: Publication Date

# Source editor settings
source_editor:
  tab_size: 2

# Path to the built site
build:
  output_path: _site
