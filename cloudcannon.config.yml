# CloudCannon Configuration - TiM Ltd.

collections_config:
  posts:
    path: _posts
    output: true
    name: Articles
    singular_name: Article
    icon: newspaper

    # File naming pattern for new posts
    create:
      path: "{date|year}-{date|month}-{date|day}-{title|slugify}.md"

    # Schema for new articles
    schemas:
      default:
        path: .cloudcannon/schemas/article.md
        name: New Article
        remove_extra_inputs: false

    # Hide _schema field (internal CloudCannon field, not needed in output)
    _inputs:
      _schema:
        hidden: true
      layout:
        hidden: true
      published:
        hidden: true
      title:
        type: text
        label: Article Title
      date:
        type: date
        label: Publication Date
        instance_value: NOW
        options:
          date_format: YYYY-MM-DD
          empty_type: string
      tag:
        type: select
        label: Category
        options:
          values:
            - Featured
            - Publication
            - Insight
            - News
      author:
        type: text
        label: Author
      read_time:
        type: text
        label: Read Time
        comment: "e.g. 5 min read"
      excerpt:
        type: textarea
        label: Summary
        comment: "Short summary shown on the news page (1-2 sentences)"

timezone: Africa/Nairobi
