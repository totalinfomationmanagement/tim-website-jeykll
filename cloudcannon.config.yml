# CloudCannon Configuration - TiM Ltd.

collections_config:
  posts:
    path: _posts
    output: true
    name: Articles
    singular_name: Article
    icon: newspaper

    # path is already _posts, so create path must NOT include _posts again
    create:
      path: "{date|year}-{date|month}-{date|day}-{title|slugify}.md"

    schemas:
      default:
        path: .cloudcannon/schemas/article.md
        name: New Article

    _inputs:
      _schema:
        hidden: true
      layout:
        hidden: true
      published:
        hidden: true
      title:
        type: text
        label: Article Title
      date:
        type: date
        label: Publication Date
        options:
          date_format: YYYY-MM-DD
      tag:
        type: select
        label: Category
        options:
          values:
            - Featured
            - Publication
            - Insight
            - News
      author:
        type: text
        label: Author
      read_time:
        type: text
        label: Read Time
        comment: "e.g. 5 min read"
      excerpt:
        type: textarea
        label: Summary

timezone: Africa/Nairobi
