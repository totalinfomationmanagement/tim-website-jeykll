# CloudCannon CMS Configuration for TiM Ltd.
collections_config:
  posts:
    path: _posts
    name: Articles
    singular_name: Article
    icon: newspaper
    add_options:
      - name: Add Article
        schema: default
        icon: add
    schemas:
      default:
        path: .cloudcannon/schemas/article.md
    _editables:
      content:
        format: true
        bold: true
        italic: true
        bulletedlist: true
        numberedlist: true
        link: true
        blockquote: true
        horizontalrule: true
    _inputs:
      title:
        label: Article Title
        comment: The full title of the article
      tag:
        label: Category
        type: select
        options:
          values:
            - Featured
            - Publication
            - Insight
            - News
      author:
        label: Author Name
      read_time:
        label: Read Time
        comment: e.g. 5 min read
      excerpt:
        label: Article Summary
        comment: 1-2 sentence summary shown on the news listing page
        type: textarea

data_config:
  true: true

timezone: Africa/Nairobi
