title: Total Information Management Ltd.
description: ICT Policy, Strategy & Development Consultants - Nairobi, Kenya

url: "https://totalinfomationmanagement.github.io"
baseurl: "/tim-website-jeykll"

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /news/:slug/

# Publish future-dated posts
future: true

# Defaults applied to every post automatically
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: article
      author: TiM Editorial Team
      published: true

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
theme: null
