title: Total Information Management Ltd.
description: ICT Policy, Strategy & Development Consultants - Nairobi, Kenya

url: "https://totalinfomationmanagement.com"
baseurl: ""

theme: null

# Build settings
markdown: kramdown
highlighter: rouge
permalink: /news/:slug/
future: true

collections:
  posts:
    output: true
    permalink: /news/:slug/

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: article
      author: TiM Editorial Team
      published: true

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor

plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
