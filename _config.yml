title: Total Information Management Ltd.
description: ICT Policy, Strategy & Development Consultants - Nairobi, Kenya
url: ""
baseurl: ""

# Build settings
markdown: kramdown
highlighter: rouge

# Permalinks - clean URLs for posts
permalink: /news/:slug/

# Defaults - apply layout to all posts automatically
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: article
      author: TiM Editorial Team

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor

# Plugins (supported by GitHub Pages)
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
