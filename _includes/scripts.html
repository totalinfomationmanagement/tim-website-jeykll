<script>
  const hamburger = document.getElementById('hamburger');
  const drawer    = document.getElementById('nav-drawer');
  const overlay   = document.getElementById('nav-overlay');
  function openDrawer()  { hamburger.classList.add('open'); drawer.classList.add('open'); overlay.classList.add('open'); document.body.style.overflow='hidden'; }
  function closeDrawer() { hamburger.classList.remove('open'); drawer.classList.remove('open'); overlay.classList.remove('open'); document.body.style.overflow=''; }
  hamburger.addEventListener('click', () => drawer.classList.contains('open') ? closeDrawer() : openDrawer());
  overlay.addEventListener('click', closeDrawer);
  document.querySelectorAll('.drawer-link').forEach(l => l.addEventListener('click', closeDrawer));
  document.addEventListener('keydown', e => { if(e.key==='Escape') closeDrawer(); });
  const obs = new IntersectionObserver((entries) => {
    entries.forEach((e,i) => { if(e.isIntersecting){ setTimeout(()=>e.target.classList.add('visible'),i*80); obs.unobserve(e.target); }});
  }, {threshold:0.1});
  document.querySelectorAll('.fade-up').forEach(el => obs.observe(el));
  const secs = document.querySelectorAll('section[id]');
  const navAs = document.querySelectorAll('.nav-links a');
  window.addEventListener('scroll', () => {
    let cur='';
    secs.forEach(s => { if(window.scrollY >= s.offsetTop-80) cur=s.id; });
    navAs.forEach(a => { a.style.color = a.getAttribute('href')==='#'+cur||a.getAttribute('href')==='/#'+cur ? 'rgba(201,162,39,1)' : ''; });
  }, {passive:true});
</script>
